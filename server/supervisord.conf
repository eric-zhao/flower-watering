; Drop into /etc/supervisor/conf.d/flower_watering_service.conf on the
; middle server, then:
;   supervisorctl reread
;   supervisorctl update
;   supervisorctl start flower_watering_service

[program:flower_watering_service]
command=/root/flower_watering/server/.venv/bin/uvicorn main:app --host 0.0.0.0 --port 7100
directory=/root/flower_watering/server
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/flower_watering_service.out.log
stderr_logfile=/var/log/flower_watering_service.err.log
environment=FLOWER_WATERING_DB="/root/flower_watering/data.db"
